<!DOCTYPE html>
<html>
<head>
    <title>{% if page_title %}{{ page_title }} - {% endif %}Study Planner</title>
    <style>
        /* Dashboard-ல இருக்குற style + Global styles */
        body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;min-height:100vh;padding:20px}
        .container{max-width:800px;margin:0 auto;text-align:center}
        h1{font-size:36px;margin-bottom:20px;text-shadow:0 2px 10px rgba(0,0,0,0.3)}
        h2{font-size:24px;margin-bottom:40px}
        .btn{display:inline-block;padding:20px 40px;margin:15px;background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);color:white;text-decoration:none;border-radius:15px;font-size:20px;font-weight:bold;box-shadow:0 10px 30px rgba(0,0,0,0.2);transition:all 0.3s}
        .btn:hover{transform:translateY(-5px);box-shadow:0 15px 40px rgba(0,0,0,0.3)}
        .welcome{background:rgba(255,255,255,0.1);padding:30px;border-radius:20px;margin-bottom:40px;backdrop-filter:blur(10px)}
        .back-btn{position:fixed;top:25px;left:25px;padding:15px 25px;background:#f39c12;color:white;text-decoration:none;border-radius:15px;font-weight:600;font-size:18px;z-index:1000}
        @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
        @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-10px);}75%{transform:translateX(10px);}}
        body.shake{animation:shake 0.2s infinite;}
    </style>
    
    <!-- 🔥 GLOBAL ALARM SCRIPT -->
    <script>
    let firedAlarms=new Set();
    document.addEventListener("DOMContentLoaded",function(){
        console.log("🎵 GLOBAL ALARM ACTIVE!");
        setInterval(()=>{fetch("/api/user-alarms").then(r=>r.json()).then(data=>{const now=new Date();data.forEach(alarm=>{if(new Date(alarm.deadline)<=now&&!firedAlarms.has(alarm.id)){firedAlarms.add(alarm.id);playAlarmSound(alarm.title);}})}).catch(e=>{});},1500);
    });
    function playAlarmSound(title){
        const audio=new Audio();audio.src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAo";audio.volume=1;audio.play().catch(e=>{});
        const alarmDiv=document.createElement("div");alarmDiv.style.cssText="position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(255,0,0,0.9);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:50px;font-weight:bold;text-shadow:0 0 30px #fff;animation:pulse 0.8s infinite;";
        alarmDiv.innerHTML=`🚨 ${title.toUpperCase()} 🚨<br><br><button onclick="this.parentElement.remove();document.body.classList.remove('shake');document.querySelectorAll('audio').forEach(a=>a.pause());" style="padding:15px 30px;font-size:20px;background:#fff;color:#f00;border:none;border-radius:10px;cursor:pointer;font-weight:bold">STOP ALARM</button>`;
        document.body.appendChild(alarmDiv);document.body.classList.add('shake');
    }
    </script>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
