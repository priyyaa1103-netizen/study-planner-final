<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Study Planner{% endblock %}</title>
    <style>
        /* Your global CSS here */
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;min-height:100vh}
        .container{max-width:900px;margin:0 auto;padding:30px;text-align:center}
        .btn{display:inline-block;padding:22px 40px;margin:10px;background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);color:white;text-decoration:none;border-radius:20px;font-size:20px;font-weight:600;box-shadow:0 12px 30px rgba(0,0,0,0.3);transition:all 0.3s}
        .btn:hover{transform:translateY(-5px);box-shadow:0 20px 40px rgba(0,0,0,0.4)}
        .back-btn{position:fixed;top:25px;left:25px;padding:18px 30px;background:#f39c12;color:white;text-decoration:none;border-radius:18px;font-size:20px;font-weight:600;z-index:1000}
        @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
        @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-10px);}75%{transform:translateX(10px);}}
        body.shake{animation:shake 0.2s infinite;}
    </style>
    <!-- 🔥 GLOBAL ALARM SCRIPT - எல்லா pages-லும் work! 🔥 -->
    <script>
    let firedAlarms = new Set();
    document.addEventListener("DOMContentLoaded", function() {
        console.log("🎵 GLOBAL ALARM LOADED EVERYWHERE!");
        setInterval(() => {
            fetch("/api/user-alarms")
            .then(r => r.json())
            .then(data => {
                const now = new Date();
                data.forEach(alarm => {
                    if(new Date(alarm.deadline) <= now && !firedAlarms.has(alarm.id)) {
                        firedAlarms.add(alarm.id);
                        console.log("🚨 ALARM TRIGGERED:", alarm.title);
                        playAlarmSound(alarm.title);
                    }
                });
            }).catch(e => console.log("Alarm check failed:", e));
        }, 2000); // 2 seconds check
    });

    function playAlarmSound(title) {
        // LOUD AUDIO + VISUAL EXPLOSION
        const audio = new Audio();
        audio.src = "data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAo";
        audio.volume = 1.0;
        audio.loop = true;
        audio.play().catch(e => console.log("Audio failed:", e));
        
        // FULL SCREEN RED EXPLOSION
        const alarmDiv = document.createElement("div");
        alarmDiv.id = "alarm-overlay";
        alarmDiv.style.cssText = `
            position:fixed;top:0;left:0;width:100vw;height:100vh;
            background:rgba(255,0,0,0.9);z-index:99999;display:flex;align-items:center;
            justify-content:center;font-size:60px;font-weight:bold;text-shadow:0 0 30px #fff;
            animation: pulse 0.8s infinite;`;
        alarmDiv.innerHTML = `🚨🚨 ${title.toUpperCase()} DEADLINE MISS! 🚨🚨<br><button onclick="stopAlarm()" style="margin-top:20px;padding:15px 30px;font-size:20px;background:#fff;color:#f00;border:none;border-radius:10px;cursor:pointer;font-weight:bold">STOP ALARM</button>`;
        document.body.appendChild(alarmDiv);
        
        // SCREEN SHAKE
        document.body.classList.add('shake');
    }

    function stopAlarm() {
        const overlay = document.getElementById("alarm-overlay");
        if (overlay) overlay.remove();
        document.body.classList.remove('shake');
        // Stop all audio
        document.querySelectorAll('audio').forEach(a => a.pause());
    }
    </script>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
