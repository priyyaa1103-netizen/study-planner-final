<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1>🔔 Active Reminders</h1>
    
    {% if pending %}
        {% for reminder in pending %}
        <div class="alert alert-warning alert-dismissible fade show" role="alert">
            <strong>🔔 {{ reminder.task }}</strong>
            <br>Time: {{ reminder.trigger_time.strftime('%H:%M:%S') }}
            <a href="/dismiss/{{ reminder.id }}" class="btn btn-danger btn-sm float-end">Dismiss</a>
        </div>
        {% endfor %}
    {% else %}
        <div class="alert alert-info">No active reminders</div>
    {% endif %}
    
    <a href="/" class="btn btn-primary">Set New Reminder</a>
</body>
</html>
